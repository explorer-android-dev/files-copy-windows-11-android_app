name: Code Quality Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run lint check
        run: ./gradlew lint --continue

      - name: Run compile check
        run: ./gradlew compileDebugSources

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: lint-reports
          path: app/build/reports/lint-results-debug.html

      - name: Post summary
        if: always()
        run: |
          echo "## 🔍 Code Quality Check" >> $GITHUB_STEP_SUMMARY
          echo "- **Lint**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Compilation**: Success" >> $GITHUB_STEP_SUMMARY
